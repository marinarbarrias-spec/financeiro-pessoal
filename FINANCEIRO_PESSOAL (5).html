<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marina · Financeiro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:14px;color:#1a1a16;background:#f0f0ea}

/* LAYOUT PRINCIPAL */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:#1c2418;display:flex;flex-direction:column;overflow-y:auto;height:100vh}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:50px;background:#fff;border-bottom:2px solid #d8d8d0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.page{flex:1;overflow-y:auto;padding:24px;background:#f0f0ea}

/* SIDEBAR */
.sb-brand{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{font-size:1.3em;font-weight:900;color:#fff}
.sb-sub{font-size:.68em;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.sb-toggle{display:flex;gap:3px;margin-top:10px;background:rgba(0,0,0,.3);border-radius:6px;padding:3px}
.sb-toggle button{flex:1;padding:5px 4px;border:none;border-radius:4px;font-size:.7em;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.sb-toggle .ton{background:#a8e060;color:#1a2a10}
.sb-toggle .toff{background:transparent;color:rgba(255,255,255,.4)}

.sb-mes{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-mes label{font-size:.6em;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.sb-mes select{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:5px;padding:6px 8px;font-size:.82em;outline:none;cursor:pointer}
.sb-mes select option{background:#1c2418}

.sb-nav{flex:1;padding:6px 0}
.nav-group-label{padding:4px 16px;font-size:.58em;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:2px;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:.82em;color:rgba(255,255,255,.55);border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.on{background:rgba(168,224,96,.12);color:#fff;border-left-color:#a8e060;font-weight:600}
.nav-badge{margin-left:auto;background:rgba(168,224,96,.2);color:#a8e060;border-radius:8px;padding:1px 6px;font-size:.68em}

.sb-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08)}
.sb-saldo-label{font-size:.6em;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px}
.sb-saldo-val{font-size:1.05em;font-weight:700;margin-top:2px}
.sb-saldo-val.pos{color:#a8e060}
.sb-saldo-val.neg{color:#ff6b6b}
.sb-btn{width:100%;margin-top:6px;padding:6px;border-radius:5px;border:none;cursor:pointer;font-size:.7em;font-weight:600;text-align:center}
.sb-save{background:rgba(168,224,96,.18);color:#a8e060;border:1px solid rgba(168,224,96,.3)}
.sb-load{background:rgba(255,255,255,.06);color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.1)}

/* TOPBAR */
.top-title{font-size:.95em;font-weight:700;color:#1a1a16}
.top-btns{display:flex;gap:6px}
.btn{padding:6px 14px;border-radius:6px;border:none;font-size:.78em;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-dark{background:#1c2418;color:#fff}
.btn-dark:hover{background:#2d3a28}
.btn-ghost{background:transparent;border:1.5px solid #c8c8c0;color:#4a4a44}
.btn-ghost:hover{background:#e8e8e0}

/* SECTIONS */
.sec{display:none}
.sec.on{display:block}

/* KPI GRID - colunas fixas para não cortar */
.kpi-grid{display:grid;gap:12px;margin-bottom:20px}
.kpi-grid-4{grid-template-columns:repeat(4,1fr)}
.kpi-grid-3{grid-template-columns:repeat(3,1fr)}
.kpi-grid-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:900px){.kpi-grid-4{grid-template-columns:repeat(2,1fr)}.kpi-grid-3{grid-template-columns:repeat(3,1fr)}}

.kpi{background:#fff;border:1.5px solid #d8d8d0;border-radius:10px;padding:14px 16px;border-top:3px solid #d8d8d0}
.kpi.g{border-top-color:#4CAF50}
.kpi.r{border-top-color:#e53935}
.kpi.b{border-top-color:#1e88e5}
.kpi.p{border-top-color:#8e24aa}
.kpi-label{font-size:.65em;text-transform:uppercase;letter-spacing:1.5px;color:#8a8a80;margin-bottom:6px}
.kpi-val{font-size:1.15em;font-weight:700;color:#1a1a16;font-family:"Courier New",monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-val.g{color:#2d6a2d}
.kpi-val.r{color:#c62828}
.kpi-val.b{color:#1565c0}
.kpi-val.p{color:#6a1b9a}
.kpi-sub{font-size:.68em;color:#9a9a90;margin-top:3px}

/* CARD */
.card{background:#fff;border:1.5px solid #d8d8d0;border-radius:10px;overflow:hidden;margin-bottom:16px}
.card-hdr{padding:12px 18px;border-bottom:1px solid #e0e0d8;display:flex;align-items:center;justify-content:space-between;background:#f8f8f4;flex-wrap:wrap;gap:8px}
.card-title{font-size:.75em;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#5a5a50}
.card-body{padding:18px}

/* TWO COLS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:800px){.two-col{grid-template-columns:1fr}}

/* TABLE */
table.tbl{width:100%;border-collapse:collapse;font-size:.82em}
table.tbl th{padding:8px 12px;text-align:left;font-size:.65em;text-transform:uppercase;letter-spacing:1px;color:#7a7a70;border-bottom:2px solid #e0e0d8;white-space:nowrap;font-weight:700}
table.tbl td{padding:9px 12px;border-bottom:1px solid #ebebе4;color:#1a1a16;vertical-align:middle}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tr:hover td{background:#f8f8f4}
table.tbl .pos{color:#2d6a2d;font-family:"Courier New",monospace;font-weight:600}
table.tbl .neg{color:#c62828;font-family:"Courier New",monospace;font-weight:600}
table.tbl .mono{font-family:"Courier New",monospace}
table.tbl tr.tot td{background:#1c2418;color:#fff;font-weight:700;border-bottom:none}
table.tbl tr.tot .pos{color:#a8e060}
table.tbl tr.tot .neg{color:#ff8888}

/* TAGS */
.tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.68em;font-weight:700;text-transform:uppercase;white-space:nowrap}
.tg{background:#e8f5e9;color:#2e7d32}
.tr{background:#ffebee;color:#c62828}
.tb{background:#e3f2fd;color:#1565c0}
.tp{background:#f3e5f5;color:#6a1b9a}
.ty{background:#fff8e1;color:#e65100}
.tgr{background:#f5f5f5;color:#555}

/* CHIPS */
.chips{display:flex;gap:8px;flex-wrap:wrap;padding:10px 18px;border-bottom:1px solid #e8e8e0}
.chip{padding:4px 12px;border-radius:16px;border:1.5px solid #c8c8c0;color:#4a4a44;font-size:.75em;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip.on{background:#1c2418;color:#fff;border-color:#1c2418}

/* BAR CHART */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-lbl{width:120px;font-size:.75em;color:#4a4a44;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:24px;background:#f0f0ea;border-radius:4px;overflow:hidden;min-width:0}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:.7em;font-weight:700;color:#fff;white-space:nowrap}
.bar-val{width:90px;text-align:right;font-size:.77em;color:#1a1a16;flex-shrink:0;font-family:"Courier New",monospace}

/* CARDS RESUMO CARTÃO */
.cart-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.cart-card{background:#fff;border:1.5px solid #d8d8d0;border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .15s}
.cart-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.cart-card.on{border-width:2px}
.cart-card-nome{font-size:.63em;text-transform:uppercase;letter-spacing:1px;color:#8a8a80;margin-bottom:4px}
.cart-card-val{font-family:"Courier New",monospace;font-weight:700;font-size:1em}
.cart-card-info{font-size:.67em;color:#aaa;margin-top:3px}

/* FILTROS */
.filtros{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.f-sel{background:#f8f8f4;border:1.5px solid #c8c8c0;color:#1a1a16;border-radius:6px;padding:5px 8px;font-size:.78em;outline:none;cursor:pointer}
.f-sel:focus{border-color:#1c2418}

/* FORM */
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:12px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:.68em;text-transform:uppercase;letter-spacing:1px;color:#5a5a50;font-weight:600}
.form-input,.form-select{background:#f8f8f4;border:1.5px solid #c8c8c0;color:#1a1a16;border-radius:6px;padding:8px 10px;font-size:.85em;outline:none;width:100%;transition:border-color .15s}
.form-input:focus,.form-select:focus{border-color:#1c2418}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-title{font-size:1em;font-weight:700;margin-bottom:16px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:#1c2418;color:#fff;padding:10px 16px;border-radius:8px;font-size:.82em;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:300;display:none}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:#8a8a80;font-size:.85em;font-style:italic}
</style>
</head>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-brand">
    <div class="sb-logo">Marina</div>
    <div class="sb-sub" id="sb-sub">Financeiro Pessoal</div>
    <div class="sb-toggle">
      <button class="ton" id="btn-p" onclick="setModo('pessoal')">👤 Pessoal</button>
      <button class="toff" id="btn-e" onclick="setModo('empresa')">🏢 Empresas</button>
    </div>
    <button onclick="irFaturas()" id="btn-faturas" style="width:100%;margin-top:8px;padding:7px;border:none;border-radius:6px;font-size:.75em;font-weight:700;cursor:pointer;background:rgba(255,209,102,0.12);color:#ffd166;transition:all .2s">💳 Faturas Consolidadas</button>

    <button class="sb-btn sb-save" onclick="exportar()">💾 Salvar backup</button>
    <label class="sb-btn sb-load" style="display:block;cursor:pointer">

  </div>
</div>

<!-- ÁREA PRINCIPAL -->
<div class="main-area">

  <div class="page" id="page"></div>
</div>

</div><!-- /layout -->

<!-- MODAL -->
<div class="overlay" id="modal" onclick="if(event.target===this)fecharModal()">

    <div class="modal-footer">

    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

const toast = msg => { const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); };

const CORF = {dog:'#2d6a2d',cesc:'#1565c0',funcional:'#0277bd',afiliados:'#6a1b9a',outros:'#555'};
const CORC = {Saúde:'#c62828',Casa:'#e65100',Alimentação:'#2e7d32',Transporte:'#1565c0',Estudos:'#1e88e5',Beleza:'#7b1fa2',Tecnologia:'#37474f',Lazer:'#0277bd',Vestuário:'#ad1457',Dívida:'#b71c1c',Pessoal:'#5d4037',Outros:'#555'};
const CORCANAL = {Dinheiro:'#2d6a2d',Cartão:'#6a1b9a',Pix:'#1565c0','Pix Online':'#0277bd',iFood:'#c62828',Caixinha:'#e65100',Online:'#7b1fa2'};
const LBFONTE = {dog:'Pró-labore DOG',cesc:'Salário CESC',funcional:'Funcional',afiliados:'Afiliados',outros:'Outros'};
const VENC = {Inter:'dia 15',Nubank:'dia 10',Santander:'dia 07',Latam:'dia 20','Inter Marina':'dia 05'};
const CORC2 = {Inter:'#6a1b9a',Nubank:'#8e24aa',Santander:'#c62828',Latam:'#e65100','Inter Marina':'#0277bd'};
// Data de virada de cada cartão (dia do mês em que a fatura fecha)
const VIRA = {Inter:9, Nubank:27, Santander:30, Latam:13, 'Inter Marina':29};
// Dado um lançamento, retorna o ano-mês da FATURA (mês que vai vencer)
function mesFatura(dataStr, cartao, historico, faturaManual) {
  // Fatura manual sobrescreve tudo
  if(faturaManual) return faturaManual;
  if(!dataStr) return null;
  const [y,m,d] = dataStr.split('-').map(Number);
  // Histórico: mês do gasto → fatura do mês seguinte (convenção para dados importados)
  if(historico) {
    const nm=m===12?1:m+1, ny=m===12?y+1:y;
    return `${ny}-${String(nm).padStart(2,'0')}`;
  }
  if(!cartao||!VIRA[cartao]) {
    const nm=m===12?1:m+1, ny=m===12?y+1:y;
    return `${ny}-${String(nm).padStart(2,'0')}`;
  }
  const vira=VIRA[cartao];
  // Regra correta: d < vira → fatura do mês seguinte; d >= vira → fatura de 2 meses
  if(d < vira) {
    const nm=m===12?1:m+1, ny=m===12?y+1:y;
    return `${ny}-${String(nm).padStart(2,'0')}`;
  } else {
    const total=y*12+m+2;
    const ny2=Math.floor((total-1)/12);
    const nm2=((total-1)%12)+1;
    return `${ny2}-${String(nm2).padStart(2,'0')}`;
  }
}
function barras(dados, cores) {
  const entries = Object.entries(dados).sort((a,b)=>b[1]-a[1]);
  if(!entries.length) return '<div class="empty-state">Sem dados para exibir</div>';
  const max = Math.max(...entries.map(e=>Math.abs(e[1])),1);
  return entries.map(([k,v])=>`
    <div class="bar-row">
      <div class="bar-lbl" title="${k}">${k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(3,Math.abs(v)/max*100)}%;background:${cores[k]||'#555'}">${Math.abs(v)/max*100>20?fR(v):''}</div></div>
      <div class="bar-val">${fR(v)}</div>
    </div>`).join('');
}

const STORAGE_KEY = 'marina_financeiro_v1';

function autoSave() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      pessoal:P, empresa:E, pagamentos:window.PGTOS||{}, savedAt:new Date().toISOString()
    }));
    const el=document.getElementById('sb-autosave');
    if(el){const t=new Date(); el.textContent='💾 Salvo '+t.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); el.style.color='rgba(168,224,96,.5)';}
  } catch(e){ console.warn('Auto-save falhou:',e); }
}

function autoLoad() {
  try {
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const data=JSON.parse(raw);
    if(!data.pessoal?.l||!data.empresa?.l) return false;
    if(new Date(data.savedAt)<new Date('2026-01-01')) return false;
    P=data.pessoal; E=data.empresa;
    if(data.pagamentos) window.PGTOS=data.pagamentos;
    console.log('✓ localStorage: '+data.savedAt);
    return true;
  } catch(e){ return false; }
}

function limparStorage() {
  if(!confirm('Limpar dados locais e voltar aos dados do arquivo?')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function updateSaldo() {

    const v=e-s; el.textContent=fR(v); el.className='sb-saldo-val '+(v>=0?'pos':'neg');
  } else {
    const empFilt=EF==='todas'?null:EF;
    const lEmp=le(MES,empFilt);

    const v=r-c; el.textContent=fR(v); el.className='sb-saldo-val '+(v>=0?'pos':'neg');
  }
}

function htmlDash() {
  const ent=lp(MES).filter(x=>x.tipo==='entrada');
  const sai=lp(MES).filter(x=>x.tipo==='saida');
  const car=lp(MES).filter(x=>x.tipo==='cartao');
  const te=ent.reduce((s,x)=>s+x.valor,0);
  const ts=sai.reduce((s,x)=>s+x.valor,0);
  // Compromisso cartões = o que vai VENCER este mês (fatura do mês)
  const tc=P.l.filter(x=>x.tipo==='cartao'&&x.cartao&&!['Pix','Dinheiro'].includes(x.cartao)&&mesFatura(x.data,x.cartao,x.historico,x.faturaManual)===MES).reduce((s,x)=>s+x.valor,0);
  const saldo=te-ts;

  // Mês anterior para comparação
  const [y,m]=MES.split('-').map(Number);
  const am=m===1?12:m-1,ay=m===1?y-1:y;
  const mesAnt=ay+'-'+String(am).padStart(2,'0');
  const lant=lp(mesAnt);
  const teAnt=lant.filter(x=>x.tipo==='entrada').reduce((s,x)=>s+x.valor,0);
  const tsAnt=lant.filter(x=>x.tipo==='saida').reduce((s,x)=>s+x.valor,0);
  const saldoAnt=teAnt-tsAnt;
  const economia=saldo-saldoAnt;

  // Vencimentos das faturas
  const VENC_D={'Inter':15,'Nubank':10,'Santander':7,'Latam':20,'Inter Marina':5};
  const VIRA_D={'Inter':9,'Nubank':27,'Santander':30,'Latam':13,'Inter Marina':29};
  // porCart = fatura do mês (o que vence, não o que foi gasto)
  const porCart={};
  P.l.filter(x=>x.tipo==='cartao'&&x.cartao&&!['Pix','Dinheiro'].includes(x.cartao)&&mesFatura(x.data,x.cartao,x.historico,x.faturaManual)===MES)
    .forEach(x=>{ porCart[x.cartao]=(porCart[x.cartao]||0)+x.valor; });

  // Dias restantes
  const hoje=new Date();
  const diaHoje=hoje.getDate();
  const [ym,mm]=MES.split('-').map(Number);
  const diasNoMes=new Date(ym,mm,0).getDate();

  // Vencimentos de cartão
  const vencCart=Object.entries(porCart)
    .filter(([k])=>VENC_D[k])
    .map(([cart,val])=>{
      const dVenc=VENC_D[cart];
      const diasRest=dVenc>=diaHoje?dVenc-diaHoje:dVenc+(diasNoMes-diaHoje);
      return {nome:cart,val,dVenc,diasRest,tipo:'cartao',urgente:diasRest<=3,proximo:diasRest<=7};
    });

  // Contas fixas das saídas (tipof==='Fixo', exceto Pagamento Fatura)
  const contasFixas=sai
    .filter(x=>x.tipof==='Fixo'&&x.categoria!=='Pagamento Fatura')
    .map(x=>{
      const dVenc=x.data?parseInt(x.data.split('-')[2]):1;
      const diasRest=dVenc>=diaHoje?dVenc-diaHoje:dVenc+(diasNoMes-diaHoje);
      return {nome:x.desc||'Conta',val:x.valor,dVenc,diasRest,tipo:'fixa',urgente:diasRest<=3,proximo:diasRest<=7,cat:x.categoria};
    });

  // Juntar e ordenar por dia
  const vencItems=[...vencCart,...contasFixas]
    .sort((a,b)=>{
      const fA=a.dVenc>=diaHoje?a.dVenc:a.dVenc+diasNoMes;
      const fB=b.dVenc>=diaHoje?b.dVenc:b.dVenc+diasNoMes;
      return fA-fB;
    });

  // Projeção de renda livre
  const totalFaturas=Object.values(porCart).reduce((s,v)=>s+v,0);
  const totalFixas=contasFixas.reduce((s,x)=>s+x.val,0);
  const rendaLivre=Math.max(0,te-ts-totalFaturas);
  const pctEconomia=te>0?(rendaLivre/te*100):0;

  // Entradas por fonte
  const gpFonte=agrup(ent,'fonte');
  const CORES_FONTE={funcional:'#6a1b9a',cesc:'#1565c0',afiliados:'#e65100',dog:'#2d6a2d',outros:'#6b7280'};
  const LABEL_FONTE={funcional:'Funcional',cesc:'CESC',afiliados:'Afiliados',dog:'Pro-labore',outros:'Outros'};
  const maxFonte=Math.max(...Object.values(gpFonte),1);

  // Categorias gastos (saída + cartão)
  const gpCat={};
  [...sai.filter(x=>x.categoria!=='Pagamento Fatura'),...car].forEach(x=>{ const c=x.categoria||'Outros'; gpCat[c]=(gpCat[c]||0)+x.valor; });
  const [y2,m2]=MES.split('-').map(Number);
  const am2=m2===1?12:m2-1,ay2=m2===1?y2-1:y2;
  const mesAnt2=ay2+'-'+String(am2).padStart(2,'0');
  const lant2=lp(mesAnt2);
  const gpCatAnt={};
  [...lant2.filter(x=>x.tipo==='saida'&&x.categoria!=='Pagamento Fatura'),...lant2.filter(x=>x.tipo==='cartao')].forEach(x=>{ const c=x.categoria||'Outros'; gpCatAnt[c]=(gpCatAnt[c]||0)+x.valor; });
  const maxCat=Math.max(...Object.values(gpCat),1);

  const HTML_KPI=(label,val,sub,cor,bg)=>`<div style="background:${bg||'#fff'};border:1.5px solid #e8e8e0;border-radius:12px;padding:16px 20px;flex:1;min-width:140px">

    <div style="font-size:.72em;color:#9a9a90;margin-top:4px">${sub||''}</div>
  </div>`;

  return `

    ${HTML_KPI('Entradas',fR(te),ent.length+' fontes','#2d6a2d')}

    ${HTML_KPI('Saldo do Mês',fR(saldo),saldo>=0?'✓ Positivo':'⚠ Negativo',saldo>=0?'#2d6a2d':'#c62828',saldo>=0?'#f0fdf4':'#fff5f5')}
    ${HTML_KPI('Compromisso Cartões',fR(tc),Object.keys(porCart).length+' cartões','#6a1b9a')}
    ${HTML_KPI('Renda Livre',fR(rendaLivre),pctEconomia.toFixed(1)+'% da renda',rendaLivre>0?'#0277bd':'#9a9a90')}
  </div>

  <div class="two-col" style="margin-bottom:20px">
    <!-- Gráfico entradas por fonte -->
    <div class="card">
      <div class="card-hdr"><div class="card-title">📥 Entradas por Fonte</div><div style="font-size:.75em;color:#9a9a90">${fML(MES)}</div></div>
      <div class="card-body">
        ${Object.entries(gpFonte).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
          <div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">

            </div>

    <div class="card">
      <div class="card-hdr"><div class="card-title">📅 Próximos Vencimentos</div><div style="font-size:.75em;color:#9a9a90">Faturas de cartão</div></div>
      <div class="card-body">
        ${vencItems.length===0?'<div class="empty-state">Sem vencimentos</div>':vencItems.map(v=>`

                <div style="font-size:.68em;color:#9a9a90">Dia ${v.dVenc} · ${v.diasRest===0?'<strong style="color:#c62828">HOJE!</strong>':v.diasRest===1?'<strong style="color:#e65100">Amanhã!</strong>':v.diasRest+' dias'}</div>

              ${v.urgente?'<div style="font-size:.62em;color:#c62828;font-weight:700">⚠ URGENTE</div>':v.proximo?'<div style="font-size:.62em;color:#e65100">⚡ Em breve</div>':''}

function htmlHist() {
  const meses=new Set(); P.l.forEach(x=>x.data&&meses.add(x.data.slice(0,7)));
  const rows=[...meses].sort().reverse().map(m=>{
    const l=P.l.filter(x=>x.data&&x.data.startsWith(m));
    const e=l.filter(x=>x.tipo==='entrada').reduce((s,x)=>s+x.valor,0);
    const s=l.filter(x=>x.tipo==='saida').reduce((s,x)=>s+x.valor,0);
    const c=P.l.filter(x=>x.tipo==='cartao'&&x.cartao&&!['Pix','Dinheiro'].includes(x.cartao)&&mesFatura(x.data,x.cartao,x.historico,x.faturaManual)===m).reduce((s,x)=>s+x.valor,0);
    const sal=e-s;
    return `<tr>
      <td><strong style="cursor:pointer;color:#1565c0" onclick="irMes('${m}')">${fML(m)}</strong></td>
      <td class="pos">${fR(e)}</td><td class="neg">${fR(s)}</td>
      <td style="color:#6a1b9a;font-family:'Courier New',monospace;font-weight:600">${fR(c)}</td>
      <td class="${sal>=0?'pos':'neg'}">${fR(sal)}</td>

  });
  return `<div class="card"><div class="card-hdr"><div class="card-title">Resumo Mensal</div></div>
    <div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>Mês</th><th>Entradas</th><th>Saídas</th><th>Faturas Cartão</th><th>Saldo</th></tr></thead>
      <tbody>${rows.length?rows.join(''):'<tr><td colspan="5" class="empty-state">Sem dados</td></tr>'}</tbody>
    </table></div></div>`;
}

function htmlCar(fCart='',modoFatura=false,fCat='') {
  // Se modoFatura=true, mostra lançamentos cuja FATURA cai no MES selecionado
  // Se modoFatura=false, mostra lançamentos realizados no MES selecionado
  let todos, lancs;
  if(modoFatura) {
    // Pega lançamentos de qualquer mês cuja fatura bate em MES
    todos = P.l.filter(x=>x.tipo==='cartao' && mesFatura(x.data,x.cartao,x.historico,x.faturaManual)===MES);
  } else {
    todos = lp(MES).filter(x=>x.tipo==='cartao');
  }
  const lancs_all = todos
    .filter(x=>!fCart||x.cartao===fCart)
    .filter(x=>!fCat||x.categoria===fCat)
    .sort((a,b)=>new Date(b.data)-new Date(a.data));
  lancs = lancs_all;

      <div class="cart-card-nome">${k}</div>

  const total=`<div class="cart-card${!fCart?' on':''}" style="background:${!fCart?'#1c2418':'#fff'};border-color:${!fCart?'#1c2418':'#d8d8d0'}" onclick="filtCar('',${modoFatura},'${fCat}')">

    <td style="color:#6a1b9a;font-family:'Courier New',monospace;font-weight:600;white-space:nowrap">- ${fR(x.valor)}</td>
    <td style="white-space:nowrap">
      <button onclick="transferir('${x.id}')" style="background:none;border:none;color:#9a9a90;cursor:pointer;margin-right:4px" title="Transferir para empresa">🔀</button>
      <button onclick="editar('${x.id}')" style="background:none;border:none;color:#9a9a90;cursor:pointer;margin-right:4px" title="Editar">✏️</button>

  const gpCat = agrup(todos.filter(x=>!fCart||x.cartao===fCart),'categoria');

function htmlEmpDash() {
  const emp=EF==='todas'?null:EF;
  const l=le(MES,emp);
  const rec=l.filter(x=>x.tipo==='receita').reduce((s,x)=>s+x.valor,0);
  // Custos pagos = Pix/Dinheiro (afetam lucro)
  const cus=l.filter(x=>x.tipo==='custo'&&['Pix','Dinheiro',''].includes(x.cartao||'')).reduce((s,x)=>s+x.valor,0);
  // Custos cartão = compromisso futuro (não afetam lucro ainda)
  const cusCart=l.filter(x=>x.tipo==='custo'&&!['Pix','Dinheiro',''].includes(x.cartao||'')).reduce((s,x)=>s+x.valor,0);
  const luc=rec-cus, cmv=rec>0?(cus/rec*100).toFixed(1):null;
  const empresas=['DOG','Afiliados'];
  const maxEmp=Math.max(...empresas.map(e=>le(MES,e).filter(x=>x.tipo==='receita').reduce((s,x)=>s+x.valor,0)),1);
  const resPorEmp=empresas.map(e=>{
    const r=le(MES,e).filter(x=>x.tipo==='receita').reduce((s,x)=>s+x.valor,0);
    const c=le(MES,e).filter(x=>x.tipo==='custo'&&['Pix','Dinheiro',''].includes(x.cartao||'')).reduce((s,x)=>s+x.valor,0);
    const lu=r-c;
    const COR={DOG:'#2d6a2d',Afiliados:'#6a1b9a'};
    return `<div style="margin-bottom:14px">
      <div style="font-size:.78em;font-weight:600;color:#3a3a30;margin-bottom:5px">${e} — <span style="color:${lu>=0?'#2d6a2d':'#c62828'}">${fR(lu)}</span></div>
      <div class="bar-row" style="margin-bottom:4px"><div class="bar-lbl" style="color:#2d6a2d">Receita</div><div class="bar-track"><div class="bar-fill" style="width:${r/maxEmp*100}%;background:${COR[e]}">${r>0?fR(r):''}</div></div></div>
      <div class="bar-row"><div class="bar-lbl" style="color:#c62828">Custo</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxEmp*100}%;background:#c62828">${c>0?fR(c):''}</div></div></div>
    </div>`;
  }).join('');
  const dogDia={};
  le(MES,'DOG').filter(x=>x.tipo==='receita').forEach(x=>{dogDia[x.data]=(dogDia[x.data]||0)+x.valor;});
  const dias=Object.entries(dogDia).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxD=Math.max(...dias.map(([,v])=>v),1);
  const media=dias.length?dias.reduce((s,[,v])=>s+v,0)/dias.length:0;
  const dogCanais=agrup(le(MES,'DOG').filter(x=>x.tipo==='receita'),'canal');
  const chips=['todas','DOG','Afiliados'].map(e=>
    `<div class="chip${EF===e?' on':''}" onclick="filtEmpresa('${e}')">${e==='todas'?'📊 Todas':e==='DOG'?'🌭 DOG':'🛍️ Afiliados'}</div>`).join('');
  return `
    <div class="chips">${chips}</div>
    <div class="kpi-grid kpi-grid-4">
      <div class="kpi g"><div class="kpi-label">Receita</div><div class="kpi-val g">${fR(rec)}</div><div class="kpi-sub">${l.filter(x=>x.tipo==='receita').length} lançamentos</div></div>
      <div class="kpi r"><div class="kpi-label">Custos</div><div class="kpi-val r">${fR(cus)}</div><div class="kpi-sub">Cartão + Pix</div></div>
      <div class="kpi b"><div class="kpi-label">Lucro</div><div class="kpi-val ${luc>=0?'g':'r'}">${fR(luc)}</div><div class="kpi-sub">Margem: ${rec>0?(luc/rec*100).toFixed(1)+'%':'—'}</div></div>
      <div class="kpi p"><div class="kpi-label">CMV</div><div class="kpi-val p" style="color:${cmv&&+cmv<=35?'#2d6a2d':'#c62828'}">${cmv?cmv+'%':'—'}</div><div class="kpi-sub">Meta ≤ 35%</div></div>
    </div>
    <div class="two-col">
      <div class="card"><div class="card-hdr"><div class="card-title">Receita por Canal — DOG</div></div><div class="card-body">${barras(dogCanais,CORCANAL)}</div></div>
      <div class="card"><div class="card-hdr"><div class="card-title">Resultado por Empresa</div></div><div class="card-body">${resPorEmp}</div></div>
    </div>
    <div class="card"><div class="card-hdr"><div class="card-title">Faturamento Diário — DOG</div><span style="font-size:.75em;color:#8a8a80">Média: ${fR(media)}/dia · ${dias.length} dias</span></div><div class="card-body">
      ${dias.length===0?'<div class="empty-state">Sem dados</div>':dias.map(([d,v])=>`
        <div class="bar-row"><div class="bar-lbl">${fD(d)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${v/maxD*100}%;background:${v>=800?'#2d6a2d':v>=500?'#4CAF50':'#e65100'}">${v/maxD*100>20?fR(v):''}</div></div>
        <div class="bar-val">${fR(v)}</div></div>`).join('')}
    </div></div>`;
}

function htmlEmpHist() {
  const meses=new Set(); E.l.forEach(x=>x.data&&meses.add(x.data.slice(0,7)));
  const rows=[];
  [...meses].sort().reverse().forEach(m=>{
    ['DOG','Afiliados'].forEach(emp=>{
      const l=E.l.filter(x=>x.data&&x.data.startsWith(m)&&x.empresa===emp);
      const r=l.filter(x=>x.tipo==='receita').reduce((s,x)=>s+x.valor,0);
      const c=l.filter(x=>x.tipo==='custo'&&['Pix','Dinheiro',''].includes(x.cartao||'')).reduce((s,x)=>s+x.valor,0);
      const cc=l.filter(x=>x.tipo==='custo'&&x.cartao&&!['Pix','Dinheiro',''].includes(x.cartao)).reduce((s,x)=>s+x.valor,0);
      if(!r&&!c&&!cc) return;
      const lu=r-c, mg=r>0?(lu/r*100).toFixed(1)+'%':'—';
      rows.push(`<tr>
        <td><strong>${fML(m)}</strong></td>
        <td><span class="tag ${emp==='DOG'?'tg':'tp'}">${emp}</span></td>
        <td class="pos">${fR(r)}</td><td class="neg">${fR(c)}</td>
        <td class="${lu>=0?'pos':'neg'}">${fR(lu)}</td>
        <td style="color:#8a8a80">${mg}</td>
      </tr>`);
    });
  });
  return `<div class="card"><div class="card-hdr"><div class="card-title">Resultado Mensal por Empresa</div></div>
    <div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>Mês</th><th>Empresa</th><th>Receita</th><th>Custo</th><th>Lucro</th><th>Margem</th></tr></thead>
      <tbody>${rows.length?rows.join(''):'<tr><td colspan="6" class="empty-state">Sem dados</td></tr>'}</tbody>
    </table></div></div>`;
}

function editar(id) {
  const l = P.l.find(x=>x.id===id);
  if(!l) return;
  // Abre o modal do tipo correto com dados preenchidos
  abrirModal(l.tipo);
  // Aguarda DOM atualizar e preenche os campos
  setTimeout(()=>{
    const m = (f,v)=>{ const el=document.getElementById(f); if(el) el.value=v; };
    m('m-data', l.data||'');
    m('m-val', l.valor||'');
    m('m-desc', l.desc||'');
    if(l.tipo==='entrada') m('m-fonte', l.fonte||'outros');
    if(l.tipo==='saida'){ m('m-cat', l.categoria||'Outros'); m('m-tipo', l.tipof||'Variável'); }
    if(l.tipo==='cartao'){ m('m-cartao', l.cartao||'Inter'); m('m-cat', l.categoria||'Outros'); m('m-parc', l.parcela||''); m('m-fatura-manual', l.faturaManual||''); if(l.parcela) detectarParc(); }
    // Ao salvar, vai excluir o antigo e criar novo
    document.getElementById('modal-title').textContent = 'Editar Lançamento';
    window._editId = id; window._editDb = 'P';
  }, 50);
}

function editarE(id) {
  const l = E.l.find(x=>x.id===id);
  if(!l) return;
  const tipo = l.tipo==='receita'?'receita':'custo';
  abrirModalEmp(tipo);
  setTimeout(()=>{
    const m = (f,v)=>{ const el=document.getElementById(f); if(el) el.value=v; };
    m('m-data', l.data||'');
    m('m-val', l.valor||'');
    m('m-desc', l.desc||'');
    m('m-emp', l.empresa||'DOG');
    if(tipo==='receita') m('m-canal', l.canal||'Dinheiro');
    if(tipo==='custo'){ m('m-cat', l.categoria||'Insumos'); m('m-pgto', l.cartao||'Inter'); }
    document.getElementById('modal-title').textContent = 'Editar Lançamento';
    window._editId = id; window._editDb = 'E';
  }, 50);
}

function salvar() {
  // Transferência não precisa de data/valor - tratar primeiro
  if(MTIPO==='transferir') {
    const transferId = parseInt(document.getElementById('m-transfer-id')?.value);
    const l = P.l.find(x=>x.id===transferId);
    if(l) {
      const emp = document.getElementById('m-emp')?.value||'DOG';
      const cat = document.getElementById('m-cat')?.value||'Insumos';
      E.l.push({...l, tipo:'custo', empresa:emp, categoria:cat, id:Date.now()});
      P.l = P.l.filter(x=>x.id!==transferId);
      fecharModal(); initMeses(); renderTudo(); toast('✓ Transferido para '+emp+'!');
    }
    return;
  }
  if(MTIPO==='transferirE') {
    const transferId = parseInt(document.getElementById('m-transfer-id')?.value);
    const l = E.l.find(x=>x.id===transferId);
    if(l) {
      const tipo = document.getElementById('m-tipo-p')?.value||'cartao';
      const cat = document.getElementById('m-cat')?.value||'Outros';
      P.l.push({...l, tipo, categoria:cat, tipof:'Variável', id:Date.now()});
      E.l = E.l.filter(x=>x.id!==transferId);
      fecharModal(); initMeses(); renderTudo(); toast('✓ Transferido para Pessoal!');
    }
    return;
  }

  const data=document.getElementById('m-data')?.value;
  const val=parseFloat(document.getElementById('m-val')?.value);
  const desc=(document.getElementById('m-desc')?.value||'').trim();
  if(!data||!val) return toast('Preencha data e valor!');
  const id=Date.now();
  const CAT_FONTE={dog:'Pro-labore',cesc:'Salário',funcional:'Salário',afiliados:'Afiliados',outros:'Outros'};
  if(MTIPO==='entrada'){
    const fonte=document.getElementById('m-fonte')?.value||'outros';
    P.l.push({id,tipo:'entrada',data,fonte,desc,valor:val,categoria:CAT_FONTE[fonte]||'Outros'});
  } else if(MTIPO==='saida'){
    const cat=document.getElementById('m-cat')?.value||'Outros';
    const tipof=document.getElementById('m-tipo')?.value||'Variável';
    P.l.push({id,tipo:'saida',data,desc,valor:val,categoria:cat,tipof});
    // Se for Fixo e não for Pagamento Fatura, replicar nos meses seguintes
    if(tipof==='Fixo' && cat!=='Pagamento Fatura') {
      const [dy,dm,dd]=data.split('-').map(Number);
      for(let i=1;i<=7;i++){
        let nm=dm+i,ny=dy;
        while(nm>12){nm-=12;ny++;}
        const maxD=new Date(ny,nm,0).getDate();
        const nd=`${ny}-${String(nm).padStart(2,'0')}-${String(Math.min(dd,maxD)).padStart(2,'0')}`;
        // Verificar se já existe
        const jaExiste=P.l.some(x=>x.tipo==='saida'&&x.desc===desc&&x.data.slice(0,7)===nd.slice(0,7)&&Math.abs(x.valor-val)<0.01);
        if(!jaExiste) P.l.push({id:Date.now()+i,tipo:'saida',data:nd,desc,valor:val,categoria:cat,tipof,gerado:true});
      }
      toast('✓ Lançamento fixo criado para os próximos 7 meses!');
    }
  } else if(MTIPO==='cartao'){
    const cartao=document.getElementById('m-cartao')?.value||'Inter';
    const cat=document.getElementById('m-cat')?.value||'Outros';
    const parc=document.getElementById('m-parc')?.value||'À vista';
    const autoParc=document.getElementById('m-parc-auto')?.checked&&parc&&parc!=='À vista';
    const tipof='Fixo'; // cartão sempre fixo para cálculo
    const faturaManual=document.getElementById('m-fatura-manual')?.value||'';
    P.l.push({id,tipo:'cartao',data,desc,valor:val,cartao,categoria:cat,parcela:parc,tipof:'Variável',...(faturaManual?{faturaManual}:{})});
    // Criar parcelas restantes automaticamente
    if(autoParc){
      const pm=parc.match(/^(\d+)\/(\d+)$/);
      if(pm){
        const [,at,tot]=[,parseInt(pm[1]),parseInt(pm[2])];
        for(let i=1;i<=tot-at;i++){
          const ndata=addMonths(data,i);
          const nparc=`${at+i}/${tot}`;
          // Se tem faturaManual, incrementar mês a mês
          let nFaturaManual='';
          if(faturaManual){
            const [fy,fm]=faturaManual.split('-').map(Number);
            const ntotal=fy*12+fm+i;
            const nfy=Math.floor((ntotal-1)/12);
            const nfm=((ntotal-1)%12)+1;
            nFaturaManual=`${nfy}-${String(nfm).padStart(2,'0')}`;
          }
          const novo={id:Date.now()+i,tipo:'cartao',data:ndata,desc,valor:val,cartao,categoria:cat,parcela:nparc,tipof:'Variável',gerado:true};
          if(nFaturaManual) novo.faturaManual=nFaturaManual;
          P.l.push(novo);
        }
      }
    }
  } else if(MTIPO==='emp_receita'){
    const emp=document.getElementById('m-emp')?.value||'DOG';
    const canal=document.getElementById('m-canal')?.value||'Dinheiro';
    E.l.push({id,tipo:'receita',data,empresa:emp,canal,desc,valor:val});
  } else if(MTIPO==='emp_custo'){
    const emp=document.getElementById('m-emp')?.value||'DOG';
    const cat=document.getElementById('m-cat')?.value||'Insumos';
    const pgto=document.getElementById('m-pgto')?.value||'Pix';
    const faturaEmp=document.getElementById('m-fatura-emp')?.value||'';
    E.l.push({id,tipo:'custo',data,empresa:emp,categoria:cat,cartao:pgto,desc,valor:val,parcela:'À vista',...(faturaEmp?{faturaManual:faturaEmp}:{})});
  }
  // Se for edição, remove o lançamento antigo
  if(window._editId) {
    if(window._editDb==='P') P.l=P.l.filter(x=>x.id!==window._editId);
    else E.l=E.l.filter(x=>x.id!==window._editId);
    window._editId=null; window._editDb=null;
  }
  fecharModal(); initMeses(); renderTudo(); toast('✓ Salvo!');
  if(CUR==='faturas') setTimeout(()=>{ document.getElementById('page').innerHTML=htmlFaturas(false); },50);
}

function htmlEmpCar(fEmp='',fCart='',modoFatura=false,fCatE='') {
  // Se modoFatura=true, mostra custos cuja FATURA cai no MES selecionado
  let base;
  if(modoFatura) {
    base = E.l.filter(x=>x.tipo==='custo' && x.cartao && !['Pix','Dinheiro','',null,undefined].includes(x.cartao) && mesFatura(x.data,x.cartao,x.historico,x.faturaManual)===MES);
  } else {
    base = E.l.filter(x=>x.data&&x.data.startsWith(MES)&&x.tipo==='custo'&&x.cartao&&!['Pix','Dinheiro','',null,undefined].includes(x.cartao));
  }
  const todos = base.filter(x=>!fCatE||x.categoria===fCatE);
  // Chips empresa
  const gpEmpCar=agrup(base,'empresa');
  const chipsEmpCar=Object.entries(gpEmpCar).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
    `<div class="chip${fEmp===k?' on':''}" onclick="filtEmpCar('${fEmp===k?'':k}','${fCart}',${modoFatura},'${fCatE}')">${k==='DOG'?'🌭 DOG':'🛍️ Afiliados'} · <strong>${fR(v)}</strong></div>`).join('');
  // Chips categoria
  const gpCatCar=agrup(base.filter(x=>!fEmp||x.empresa===fEmp),'categoria');
  const chipsCatCar=Object.entries(gpCatCar).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
    `<div class="chip${fCatE===k?' on':''}" onclick="filtEmpCar('${fEmp}','${fCart}',${modoFatura},'${fCatE===k?'':k}')">${k} · <strong>${fR(v)}</strong></div>`).join('');
  const lancs = todos
    .filter(x=>(!fEmp||x.empresa===fEmp))
    .filter(x=>(!fCart||x.cartao===fCart))
    .sort((a,b)=>new Date(b.data)-new Date(a.data));

  // Resumo por cartão
  const gCart = agrup(todos.filter(x=>!fEmp||x.empresa===fEmp),'cartao');
  const gEmp  = agrup(todos,'empresa');

  // CORC2 global
  // const CORC2 = {Inter:'#6a1b9a',Nubank:'#8e24aa',Santander:'#c62828',Latam:'#e65100','Inter Marina':'#0277bd',Pix:'#2d6a2d',Dinheiro:'#555'};
  const CORE = {DOG:'#2d6a2d',Afiliados:'#6a1b9a'};

  // Cards por empresa
  const empCards = Object.entries(gEmp).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
    `<div class="cart-card${fEmp===k?' on':''}" style="border-color:${fEmp===k?CORE[k]||'#555':'#d8d8d0'}" onclick="filtEmpCar('${fEmp===k?'':k}','${fCart}',${modoFatura})">
      <div class="cart-card-nome">${k==='DOG'?'🌭 DOG':'🛍️ Afiliados'}</div>
      <div class="cart-card-val" style="color:${CORE[k]||'#555'}">- ${fR(v)}</div>
      <div class="cart-card-info">${todos.filter(x=>x.empresa===k).length} lançamentos</div>
    </div>`).join('');

  const totalEmpCard = `<div class="cart-card${!fEmp?' on':''}" style="background:${!fEmp?'#1c2418':'#fff'};border-color:${!fEmp?'#1c2418':'#d8d8d0'}" onclick="filtEmpCar('','${fCart}',${modoFatura})">
    <div class="cart-card-nome" style="color:${!fEmp?'rgba(255,255,255,.4)':'#8a8a80'}">Total Empresas</div>
    <div class="cart-card-val" style="color:${!fEmp?'#a8e060':'#1a1a16'}">- ${fR(todos.reduce((s,x)=>s+x.valor,0))}</div>
    <div class="cart-card-info" style="color:${!fEmp?'rgba(255,255,255,.3)':'#aaa'}">${todos.length} lançamentos</div>
  </div>`;

  // Cards por cartão (do filtro de empresa selecionado)
  const cartCards = Object.entries(gCart).filter(([k])=>k!=='Pix'&&k!=='Dinheiro').sort((a,b)=>b[1]-a[1]).map(([k,v])=>
    `<div class="cart-card${fCart===k?' on':''}" style="border-color:${fCart===k?CORC2[k]||'#555':'#d8d8d0'}" onclick="filtEmpCar('${fEmp}','${fCart===k?'':k}',${modoFatura})">
      <div class="cart-card-nome">${k}</div>
      <div class="cart-card-val" style="color:${CORC2[k]||'#555'}">- ${fR(v)}</div>
      <div class="cart-card-info">Vence ${VENC[k]||'—'} · vira dia ${VIRA[k]||'?'}</div>
      <div class="cart-card-info">${todos.filter(x=>x.cartao===k&&(!fEmp||x.empresa===fEmp)).length} lanç.</div>
    </div>`).join('');

  const rows = lancs.map(x=>`<tr>
    <td>${fD(x.data)}</td>
    <td><span class="tag ${x.empresa==='DOG'?'tg':'tp'}">${x.empresa}</span></td>

    <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${x.desc||'—'}</td>

    <td style="color:#8a8a80;font-size:.78em;white-space:nowrap">${x.faturaManual?'✏️':'📋'} ${fML(mesFatura(x.data,x.cartao,x.historico,x.faturaManual))}</td>

      <button onclick="delE('${x.id}')" style="background:none;border:none;color:#bbb;cursor:pointer" title="Excluir">✕</button>

  return `

      <button onclick="filtEmpCar('${fEmp}','${fCart}',true)" style="padding:6px 14px;border:none;border-radius:6px;font-size:.78em;font-weight:700;cursor:pointer;background:${modoFatura?'#1c2418':'transparent'};color:${modoFatura?'#fff':'#6a6a60'}">📋 Fatura do mês</button>

    <div style="margin-bottom:10px;font-size:.78em;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#5a5a50">Por Empresa</div>
    <div class="cart-cards" style="margin-bottom:20px">${empCards}${totalEmpCard}</div>

    <div class="cart-cards" style="margin-bottom:20px">${cartCards}</div>`:''}

    <div class="card">
      <div class="card-hdr">
        <div class="card-title">${fEmp||'Todas empresas'} — Cartões ${fML(MES)}</div>
        <div class="filtros">
          <select class="f-sel" onchange="filtEmpCar(this.value,'${fCart}',${modoFatura})">
            <option value="">Todas empresas</option>
            <option value="DOG"${fEmp==='DOG'?' selected':''}>🌭 DOG</option>
            <option value="Afiliados"${fEmp==='Afiliados'?' selected':''}>🛍️ Afiliados</option>
          </select>
          <select class="f-sel" onchange="filtEmpCar('${fEmp}',this.value,${modoFatura})">
            <option value="">Todos cartões</option>
            ${['Inter','Nubank','Santander','Latam','Inter Marina'].map(c=>`<option value="${c}"${fCart===c?' selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="chips" style="padding:10px 18px 0">${chipsEmpCar}</div>

      <div style="overflow-x:auto"><table class="tbl">
        <thead><tr><th>Data</th><th>Empresa</th><th>Categoria</th><th>Descrição</th><th>Cartão</th><th>Parcela</th><th>Fatura</th><th>Valor</th><th></th></tr></thead>
        <tbody>${rows.length

function exportar(){
  const b=new Blob([JSON.stringify({pessoal:P,empresa:E,pagamentos:window.PGTOS||{}},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='marina_backup_'+new Date().toISOString().split('T')[0]+'.json'; a.click();
  toast('✓ Backup salvo!');
}
function importar(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.pessoal?.l) P=d.pessoal;
      if(d.empresa?.l) E=d.empresa;
      if(d.pagamentos) window.PGTOS=d.pagamentos;
      initMeses(); renderTudo(); toast('✓ Backup carregado!');
    }catch(ex){ toast('✗ Erro ao carregar'); }
  };
  r.readAsText(f);
}

function htmlFaturas(modoFatura=false, mesSel=null) {
  if(mesSel) MES = mesSel;
  const VIRA_F = {Inter:9, Nubank:27, Santander:30, Latam:13, 'Inter Marina':29};
  const VENC_LABELS = {Inter:'Vence dia 15', Nubank:'Vence dia 10', Santander:'Vence dia 07', Latam:'Vence dia 20', 'Inter Marina':'Vence dia 05'};
  const cartoes = ['Inter','Nubank','Santander','Latam','Inter Marina'];

  function mf(data_str, cartao, historico, faturaManual) {
    if(faturaManual) return faturaManual;
    if(!data_str) return null;
    const [y,m,d] = data_str.split('-').map(Number);
    if(historico) {
      const nm=m===12?1:m+1, ny=m===12?y+1:y;
      return `${ny}-${String(nm).padStart(2,'0')}`;
    }
    if(!VIRA_F[cartao]) {
      const nm=m===12?1:m+1, ny=m===12?y+1:y;
      return `${ny}-${String(nm).padStart(2,'0')}`;
    }
    const vira=VIRA_F[cartao];
    if(d < vira) {
      const nm=m===12?1:m+1, ny=m===12?y+1:y;
      return `${ny}-${String(nm).padStart(2,'0')}`;
    } else {
      const total=y*12+m+2;
      return `${Math.floor((total-1)/12)}-${String(((total-1)%12)+1).padStart(2,'0')}`;
    }
  }

  const todosP = P.l.filter(x=>x.tipo==='cartao'&&x.cartao&&!['Pix','Dinheiro'].includes(x.cartao));
  const todosE = E.l.filter(x=>x.tipo==='custo'&&x.cartao&&!['Pix','Dinheiro','',null,undefined].includes(x.cartao||''));

  const meses = new Set();
  [...todosP,...todosE].forEach(x=>{ const m_=mf(x.data,x.cartao,x.historico,x.faturaManual); if(m_) meses.add(m_); });
  for(let mm=1;mm<=12;mm++) meses.add(`2026-${String(mm).padStart(2,'0')}`);
  const mesesOrdenados=[...meses].sort().reverse();

  const rows = cartoes.map(cart=>{
    const filtP=modoFatura?todosP.filter(x=>x.cartao===cart&&mf(x.data,x.cartao,x.historico,x.faturaManual)===MES):todosP.filter(x=>x.cartao===cart&&x.data&&x.data.startsWith(MES));
    const filtE=modoFatura?todosE.filter(x=>x.cartao===cart&&mf(x.data,x.cartao,x.historico,x.faturaManual)===MES):todosE.filter(x=>x.cartao===cart&&x.data&&x.data.startsWith(MES));
    const totalP=filtP.reduce((s,x)=>s+x.valor,0);
    const totalE=filtE.reduce((s,x)=>s+x.valor,0);
    const total=totalP+totalE;
    if(total===0) return null;
    return {cart,totalP,totalE,total,filtP,filtE};
  }).filter(Boolean);

  const totalGeral=rows.reduce((s,r)=>s+r.total,0);
  const maxVal=Math.max(...rows.map(r=>r.total),1);
  if(!window.PGTOS) window.PGTOS={};
  if(!window.PGTOS[MES]) window.PGTOS[MES]={};

  const pgtoCards=cartoes.map(cart=>{
    const fatura=modoFatura?[...todosP,...todosE].filter(x=>x.cartao===cart&&mf(x.data,x.cartao,x.historico,x.faturaManual)===MES).reduce((s,x)=>s+x.valor,0):[...todosP,...todosE].filter(x=>x.cartao===cart&&x.data&&x.data.startsWith(MES)).reduce((s,x)=>s+x.valor,0);
    const pago=(window.PGTOS[MES][cart]||[]).reduce((s,p)=>s+p.valor,0);
    return {cart,fatura,pago,falta:Math.max(0,fatura-pago)};

    <button onclick="document.getElementById('page').innerHTML=htmlFaturas(true)" style="padding:6px 16px;border:none;border-radius:6px;font-size:.8em;font-weight:700;cursor:pointer;background:${modoFatura?'#1c2418':'transparent'};color:${modoFatura?'#fff':'#6a6a60'}">📋 Fatura do mês</button>

  const mesSelect=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <span style="font-size:.8em;color:#5a5a50;font-weight:600">Mês:</span>

      ${mesesOrdenados.map(m=>`<option value="${m}"${m===MES?' selected':''}>${fML(m)}</option>`).join('')}
    </select>
  </div>`;

  const pgtoSection=`<div class="card" style="margin-bottom:20px">
    <div class="card-hdr"><div class="card-title">💳 Pagamento de Faturas — ${fML(MES)}</div></div>
    <div class="card-body" style="padding:0"><table class="tbl">
      <thead><tr><th>Cartão</th><th>Fatura Total</th><th>Pago</th><th>Falta Pagar</th><th>Status</th><th>Ação</th></tr></thead>
      <tbody>${pgtoCards.map(r=>`<tr>
        <td><strong style="color:${CORC2[r.cart]||'#555'}">${r.cart}</strong><div style="font-size:.68em;color:#9a9a90">${VENC_LABELS[r.cart]||''}</div></td>
        <td style="font-family:'Courier New',monospace;font-weight:600">- ${fR(r.fatura)}</td>
        <td style="color:#2d6a2d;font-family:'Courier New',monospace">${r.pago>0?'✓ '+fR(r.pago):'—'}</td>
        <td style="font-family:'Courier New',monospace;font-weight:700;color:${r.falta===0?'#2d6a2d':'#c62828'}">${r.falta===0?'✅ Quitada':'- '+fR(r.falta)}</td>
        <td>${r.falta===0?'<span style="background:#e8f5e9;color:#2e7d32;padding:3px 10px;border-radius:10px;font-size:.72em;font-weight:700">PAGA</span>':r.pago>0?'<span style="background:#fff8e1;color:#e65100;padding:3px 10px;border-radius:10px;font-size:.72em;font-weight:700">PARCIAL</span>':'<span style="background:#ffebee;color:#c62828;padding:3px 10px;border-radius:10px;font-size:.72em;font-weight:700">PENDENTE</span>'}</td>
        <td>${r.falta>0?`<button onclick="lancarPagamento('${r.cart}','${MES}',${r.falta})" style="background:#1c2418;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:.72em;cursor:pointer;font-weight:600">+ Pagar</button>`:''}
        ${r.pago>0?`<button onclick="verPagamentos('${r.cart}','${MES}')" style="background:transparent;border:1.5px solid #d8d8d0;color:#555;border-radius:6px;padding:5px 10px;font-size:.72em;cursor:pointer;margin-left:4px">Ver</button>`:''}</td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>`;

  const cards=rows.map(r=>{
    const txAll=[...r.filtP.map(x=>({...x,_o:'P'})),...r.filtE.map(x=>({...x,_o:'E'}))].sort((a,b)=>new Date(b.data)-new Date(a.data));
    const txRows=txAll.map(x=>`<tr>
      <td>${fD(x.data)}</td>
      <td><span class="tag ${x._o==='P'?'tb':'tg'}">${x._o==='P'?'👤':'🏢'}</span></td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x.desc||'—'}</td>
      <td><span class="tag tgr">${x.categoria||'—'}</span></td>
      <td class="mono">${x.parcela||'À vista'}</td>
      <td style="font-family:'Courier New',monospace;font-weight:600;color:${CORC2[r.cart]};white-space:nowrap">- ${fR(x.valor)}</td>
      <td style="white-space:nowrap">
        <button onclick="${x._o==='P'?`editar(${x.id})`:`editarE(${x.id})`}" style="background:none;border:none;color:#9a9a90;cursor:pointer">✏️</button>
        <button onclick="${x._o==='P'?`transferir(${x.id})`:`transferirE(${x.id})`}" style="background:none;border:none;color:#9a9a90;cursor:pointer">🔀</button>
      </td>
    </tr>`).join('');
    return `<div style="background:#fff;border:1.5px solid #d8d8d0;border-radius:12px;overflow:hidden;margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#f8f8f4;cursor:pointer"
        onclick="(function(el){var t=el.parentElement.querySelector('.fat-tx');var o=t.style.display==='block';t.style.display=o?'none':'block';el.querySelector('.fat-toggle').textContent=o?'▼ Ver lançamentos':'▲ Fechar';})(this)">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:12px;height:12px;border-radius:3px;background:${CORC2[r.cart]}"></div>
          <div><div style="font-size:.85em;font-weight:700">${r.cart}</div>
          <div style="font-size:.68em;color:#9a9a90">${VENC_LABELS[r.cart]||'—'} · vira dia ${VIRA_F[r.cart]||'?'}</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:16px">
          <div style="text-align:right">
            <div style="font-family:'Courier New',monospace;font-weight:700;font-size:1.1em;color:${CORC2[r.cart]}">- ${fR(r.total)}</div>
            <div style="font-size:.7em;color:#9a9a90">${fR(r.totalP)} pessoal + ${fR(r.totalE)} empresa</div>
          </div>
          <span class="fat-toggle" style="font-size:.75em;color:#9a9a90;white-space:nowrap">▼ Ver lançamentos</span>
        </div>
      </div>
      <div style="padding:10px 20px;border-bottom:1px solid #f0f0ea">
        <div style="display:flex;gap:6px;margin-bottom:6px">
          ${r.totalP>0?`<div style="flex:${r.totalP/r.total};background:#1565c0;height:8px;border-radius:4px 0 0 4px"></div>`:''}
          ${r.totalE>0?`<div style="flex:${r.totalE/r.total};background:#2d6a2d;height:8px;border-radius:${r.totalP>0?'0 4px 4px 0':'4px'}"></div>`:''}
        </div>
        <div style="display:flex;gap:16px;font-size:.75em">
          ${r.totalP>0?`<span style="color:#1565c0">● Pessoal: ${fR(r.totalP)}</span>`:''}
          ${r.totalE>0?`<span style="color:#2d6a2d">● Empresa: ${fR(r.totalE)}</span>`:''}
          <span style="color:#9a9a90;margin-left:auto">${txAll.length} lançamentos</span>
        </div>
      </div>
      <div class="fat-tx" style="display:none">
        <div style="overflow-x:auto"><table class="tbl">
          <thead><tr><th>Data</th><th></th><th>Descrição</th><th>Categoria</th><th>Parcela</th><th>Valor</th><th></th></tr></thead>
          <tbody>${txRows||'<tr><td colspan="7" class="empty-state">Sem lançamentos</td></tr>'}</tbody>
        </table></div>
        <div style="padding:10px 20px;background:#f8f8f4;text-align:right;font-size:.8em;font-weight:700">
          TOTAL: <span style="font-family:'Courier New',monospace;color:${CORC2[r.cart]}">- ${fR(r.total)}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  const barrasHTML=rows.map(r=>`<div class="bar-row">
    <div class="bar-lbl" style="color:${CORC2[r.cart]};font-weight:600">${r.cart}</div>
    <div class="bar-track" style="position:relative;height:28px">
      <div style="position:absolute;left:0;top:0;height:100%;width:${r.totalP/maxVal*100}%;background:#1565c0;border-radius:4px 0 0 4px;display:flex;align-items:center;padding-left:6px;font-size:.7em;font-weight:700;color:#fff">${r.totalP/maxVal*100>15?fR(r.totalP):''}</div>
      <div style="position:absolute;left:${r.totalP/maxVal*100}%;top:0;height:100%;width:${r.totalE/maxVal*100}%;background:#2d6a2d;border-radius:${r.totalP>0?'0 4px 4px 0':'4px'};display:flex;align-items:center;padding-left:6px;font-size:.7em;font-weight:700;color:#fff">${r.totalE/maxVal*100>15?fR(r.totalE):''}</div>
    </div>
    <div class="bar-val" style="font-weight:700">- ${fR(r.total)}</div>
  </div>`).join('');

  return toggle+mesSelect+pgtoSection+
    `<div style="background:#1c2418;border-radius:12px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-size:.68em;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.4);margin-bottom:4px">Total Geral — ${fML(MES)}</div>
        <div style="font-family:'Courier New',monospace;font-size:1.8em;font-weight:700;color:#a8e060">- ${fR(totalGeral)}</div>
      </div>
      <div style="display:flex;gap:20px;font-size:.8em">
        <div style="text-align:center"><div style="color:rgba(255,255,255,.4);font-size:.8em;margin-bottom:2px">Pessoal</div><div style="font-family:'Courier New',monospace;font-weight:700;color:#74b9ff">- ${fR(rows.reduce((s,r)=>s+r.totalP,0))}</div></div>
        <div style="text-align:center"><div style="color:rgba(255,255,255,.4);font-size:.8em;margin-bottom:2px">Empresa</div><div style="font-family:'Courier New',monospace;font-weight:700;color:#a8e060">- ${fR(rows.reduce((s,r)=>s+r.totalE,0))}</div></div>
      </div>
    </div>
    <div class="two-col">
      <div>${cards||'<div class="empty-state">Sem dados</div>'}</div>
      <div>
        <div class="card"><div class="card-hdr"><div class="card-title">Comparativo por Cartão</div></div><div class="card-body">
          <div style="display:flex;gap:12px;margin-bottom:16px;font-size:.75em"><span style="color:#1565c0">■ Pessoal</span><span style="color:#2d6a2d">■ Empresa</span></div>
          ${barrasHTML||'<div class="empty-state">Sem dados</div>'}
        </div></div>
        <div class="card"><div class="card-hdr"><div class="card-title">Resumo</div></div>
        <div style="overflow-x:auto"><table class="tbl">
          <thead><tr><th>Cartão</th><th>Pessoal</th><th>Empresa</th><th>Total</th></tr></thead>
          <tbody>
            ${rows.map(r=>`<tr>
              <td><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${CORC2[r.cart]};margin-right:6px"></span><strong>${r.cart}</strong></td>
              <td style="color:#1565c0;font-family:'Courier New',monospace">${r.totalP>0?'- '+fR(r.totalP):'—'}</td>

              <td style="font-family:'Courier New',monospace;font-weight:700;color:${CORC2[r.cart]}">- ${fR(r.total)}</td>

            <tr class="tot"><td>TOTAL</td>
              <td class="neg">- ${fR(rows.reduce((s,r)=>s+r.totalP,0))}</td>

            </tr>
          </tbody>
        </table></div></div>
      </div>
    </div>`;
}

      } else if(['custo_dog','custo_afiliados'].includes(r.tipo)) {
        if(!idsE.has(baseId)) {
          E.l.push({ id:baseId, tipo:'custo', data:r.data,
            empresa:r.empresa||'DOG', desc:r.descricao||'Custo',
            valor:r.valor, categoria:r.categoria||'Outros',
            cartao:r.cartao||'Pix', canal:'Pix', parcela:'À vista' });
          novosE++;
        }
      } else {

          P.l.push({ id:baseId, tipo:r.tipo, data:r.data,
            desc:r.descricao||'Lançamento', valor:r.valor,
            categoria:r.categoria||'Outros', cartao:r.cartao,

        }

    });

    autoSave();
